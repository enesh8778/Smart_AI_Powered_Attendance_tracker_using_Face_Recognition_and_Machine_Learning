<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Unknown Face Alerts</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        body{
            background:#f8fafc;
            font-family:'Inter',sans-serif;
            color:#202124;
        }

        /* Navbar */

        .navbar-custom{
            background:#ffffff;
            border-bottom:1px solid #e5e7eb;
            padding:16px 0;
        }

        .brand{
            text-decoration:none;
            font-size:24px;
            font-weight:700;
            color:#1a73e8;
        }

        /* Page Header */

        .page-title{
            font-size:34px;
            font-weight:700;
            margin-bottom:5px;
        }

        .page-subtitle{
            color:#5f6368;
            margin-bottom:30px;
        }

        /* Card */

        .custom-card{
            background:#ffffff;
            border:none;
            border-radius:20px;
            box-shadow:0 2px 10px rgba(0,0,0,.06);
            overflow:hidden;
        }

        .card-header-clean{
            background:#ffffff;
            border-bottom:1px solid #e5e7eb;
            padding:20px 25px;
        }

        .card-title{
            margin:0;
            font-size:20px;
            font-weight:600;
        }

        .card-body-custom{
            padding:25px;
        }

        /* Table */

        .table{
            margin-bottom:0;
        }

        .table thead th{
            background:#f8fafc;
            color:#5f6368;
            font-weight:600;
            border-bottom:2px solid #e5e7eb;
        }

        .table tbody tr:hover{
            background:#f8fafc;
        }

        /* Image */

        .alert-image{
            width:120px;
            height:120px;
            object-fit:cover;
            border-radius:12px;
            border:1px solid #e5e7eb;
        }

        /* Badge */

        .alert-badge{
            background:#fee2e2;
            color:#dc2626;
            padding:6px 12px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
        }

        /* Button */

        .btn-outline-secondary{
            border-radius:12px;
        }

    </style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-custom">

    <div class="container">

        <a href="/dashboard" class="brand">
            Smart Attendance
        </a>

        <a href="/dashboard"
           class="btn btn-outline-secondary">
            Dashboard
        </a>

    </div>

</nav>

<!-- Main Content -->

<div class="container py-5">

    <!-- Header -->

    <div class="mb-4">

        <h1 class="page-title">
            Unknown Face Alerts
        </h1>

        <p class="page-subtitle">
            Review unidentified face detections captured by the attendance monitoring system.
        </p>

    </div>

    <!-- Alerts Table -->

    <div class="custom-card">

        <div class="card-header-clean">

            <h4 class="card-title">
                Alert Records
            </h4>

        </div>

        <div class="card-body-custom">

            <div class="table-responsive">

                <table class="table align-middle">

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>Captured Image</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>

                    </thead>

                    <tbody>

                    {% for alert in alerts %}

                    <tr>

                        <td>
                            <strong>#{{alert[0]}}</strong>
                        </td>

                        <td>

                            <img src="/{{alert[1]}}"
                                 class="alert-image">

                        </td>

                        <td>{{alert[2]}}</td>

                        <td>{{alert[3]}}</td>

                        <td>

                            <span class="alert-badge">
                                Unknown Face
                            </span>

                        </td>

                    </tr>

                    {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</body>

</html>
