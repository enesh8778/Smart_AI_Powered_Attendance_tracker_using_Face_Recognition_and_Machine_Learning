<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .navbar-custom {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 16px 0;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            color: #1a73e8;
            text-decoration: none;
        }

        .form-card {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .page-title {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #5f6368;
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #dadce0;
        }

        .form-control:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
        }

        .btn-update {
            background: #1a73e8;
            border: none;
            border-radius: 12px;
            padding: 12px 28px;
            font-weight: 600;
        }

        .btn-update:hover {
            background: #1557b0;
        }

        .btn-cancel {
            border-radius: 12px;
            padding: 12px 28px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-custom">
    <div class="container">
        <a href="/dashboard" class="brand">
            Smart Attendance
        </a>
    </div>
</nav>

<div class="container">

    <div class="form-card">

        <h1 class="page-title">
            Edit Student
        </h1>

        <p class="page-subtitle">
            Update student information and save changes.
        </p>

        <!-- Backend unchanged -->
        <form action="/update_student/{{student[0]}}" method="POST">

            <div class="mb-4">
                <label class="form-label">
                    Student Name
                </label>

                <input
                    type="text"
                    name="name"
                    value="{{student[1]}}"
                    class="form-control"
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Roll Number
                </label>

                <input
                    type="text"
                    name="roll_no"
                    value="{{student[2]}}"
                    class="form-control"
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Department
                </label>

                <input
                    type="text"
                    name="department"
                    value="{{student[3]}}"
                    class="form-control"
                    required>
            </div>

            <div class="d-flex gap-2 mt-4">

                <button
                    type="submit"
                    class="btn btn-primary btn-update">
                    Save Changes
                </button>

                <a
                    href="/dashboard"
                    class="btn btn-outline-secondary btn-cancel">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
