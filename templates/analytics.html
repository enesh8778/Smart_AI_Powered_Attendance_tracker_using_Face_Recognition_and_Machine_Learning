<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Analytics Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        body{
            background:#f8fafc;
            font-family:'Inter',sans-serif;
            color:#202124;
        }

        /* Navbar */

        .navbar-custom{
            background:#ffffff;
            border-bottom:1px solid #e5e7eb;
            padding:16px 0;
        }

        .brand{
            text-decoration:none;
            font-size:24px;
            font-weight:700;
            color:#1a73e8;
        }

        /* Header */

        .page-title{
            font-size:34px;
            font-weight:700;
            margin-bottom:5px;
        }

        .page-subtitle{
            color:#5f6368;
            margin-bottom:35px;
        }

        /* Cards */

        .analytics-card{
            background:#ffffff;
            border:none;
            border-radius:20px;
            box-shadow:0 2px 10px rgba(0,0,0,.06);
            overflow:hidden;
            margin-bottom:24px;
        }

        .card-header-clean{
            background:#ffffff;
            border-bottom:1px solid #e5e7eb;
            padding:20px 25px;
        }

        .card-title{
            margin:0;
            font-size:20px;
            font-weight:600;
        }

        .card-body-custom{
            padding:25px;
        }

        /* Button */

        .btn-dashboard{
            border-radius:12px;
            padding:10px 24px;
            font-weight:600;
        }

        .btn-outline-secondary{
            border-radius:12px;
        }

    </style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-custom">

    <div class="container">

        <a href="/dashboard" class="brand">
            Smart Attendance
        </a>

        <a href="/dashboard"
           class="btn btn-outline-secondary">
            Dashboard
        </a>

    </div>

</nav>

<!-- Main Content -->

<div class="container py-5">

    <!-- Page Heading -->

    <div class="mb-4">

        <h1 class="page-title">
            Attendance Analytics Dashboard
        </h1>

        <p class="page-subtitle">
            Track attendance patterns through daily, weekly, and monthly performance insights.
        </p>

    </div>

    <!-- Daily Analytics -->

    <div class="analytics-card">

        <div class="card-header-clean">

            <h4 class="card-title">
                Daily Attendance
            </h4>

        </div>

        <div class="card-body-custom">

            {{ daily_graph | safe }}

        </div>

    </div>

    <!-- Weekly Analytics -->

    <div class="analytics-card">

        <div class="card-header-clean">

            <h4 class="card-title">
                Weekly Attendance
            </h4>

        </div>

        <div class="card-body-custom">

            {{ weekly_graph | safe }}

        </div>

    </div>

    <!-- Monthly Analytics -->

    <div class="analytics-card">

        <div class="card-header-clean">

            <h4 class="card-title">
                Monthly Attendance
            </h4>

        </div>

        <div class="card-body-custom">

            {{ monthly_graph | safe }}

        </div>

    </div>

    <!-- Footer Button -->

    <div class="text-center mt-4">

        <a href="/dashboard"
           class="btn btn-primary btn-dashboard">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
