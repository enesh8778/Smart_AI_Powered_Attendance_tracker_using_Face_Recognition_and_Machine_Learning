<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            background: #fff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #1a73e8;
            color: white;
            font-size: 28px;
            font-weight: bold;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            margin-bottom: 20px;
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #5f6368;
            margin-bottom: 35px;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #dadce0;
        }

        .form-control:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
        }

        .btn-login {
            background: #1a73e8;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            width: 100%;
        }

        .btn-login:hover {
            background: #1557b0;
        }

        .footer-text {
            text-align: center;
            color: #5f6368;
            margin-top: 25px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        SA
    </div>

    <h1 class="title">
        Smart Attendance
    </h1>

    <p class="subtitle">
        Sign in to continue
    </p>

    <!-- Backend remains unchanged -->
    <form action="/login" method="POST">

        <div class="mb-3">
            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter your username"
                required>
        </div>

        <div class="mb-4">
            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter your password"
                required>
        </div>

        <button type="submit" class="btn btn-primary btn-login">
            Sign In
        </button>

    </form>

    <div class="footer-text">
        Smart Attendance System © 2026
    </div>

</div>

</body>
</html>
